name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  schedule:
    # Nightly fuzzing run at 03:00 UTC.
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # Primary test job on Linux
  # ==========================================================================
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --features full -- -D warnings

      - name: Build
        run: cargo build --features full --verbose

      - name: Run tests
        run: cargo test --features full --verbose

      - name: Doc tests
        run: cargo test --doc --features full

      - name: Build docs (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --features full

      - name: Test no default features
        run: cargo check --no-default-features

      - name: Test individual features
        run: |
          cargo check --features hashing
          cargo check --features binary-parsing
          cargo check --features archive
          cargo check --features async
          cargo check --features server

  # ==========================================================================
  # Cross-platform builds (macOS and Windows)
  # ==========================================================================
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --features full

      - name: Run tests
        run: cargo test --features full

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --features full

      - name: Run tests
        run: cargo test --features full

  # ==========================================================================
  # MSRV Check
  # ==========================================================================
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Check MSRV
        # check (not test) so dev-only deps with newer MSRVs do not affect the
        # library/binary MSRV guarantee.
        run: cargo check --features full --verbose

  # ==========================================================================
  # Security Audit
  # ==========================================================================
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Security audit
        # RUSTSEC-2023-0071 (rsa Marvin) has no fix and is only reachable via
        # the optional yara-x dependency; batin performs no RSA operations.
        run: cargo audit --ignore RUSTSEC-2023-0071

  # ==========================================================================
  # Dependency policy (licenses + advisories + bans)
  # ==========================================================================
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # ==========================================================================
  # Code coverage
  # ==========================================================================
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --features full --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ==========================================================================
  # Benchmarks (smoke-run to catch regressions / build breakage)
  # ==========================================================================
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build benchmarks (smoke check)
        run: cargo bench --features full --no-run

  # ==========================================================================
  # YARA integration (optional feature; needs protoc to build yara-x)
  # ==========================================================================
  yara:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clippy (yara)
        run: cargo clippy --features "cli,yara" -- -D warnings

      - name: Test (yara)
        run: cargo test --features "cli,yara"

  # ==========================================================================
  # Optional surfaces: HTTP daemon and online reputation
  # ==========================================================================
  optional-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy (server)
        run: cargo clippy --features server -- -D warnings

      - name: Test (server)
        run: cargo test --features server

      - name: Clippy (online)
        run: cargo clippy --features "cli,online" -- -D warnings

      - name: Test (online, offline parsing only)
        run: cargo test --features "cli,online" reputation

  # ==========================================================================
  # C ABI bindings (separate crate)
  # ==========================================================================
  capi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build + test C API
        working-directory: capi
        run: |
          cargo clippy -- -D warnings
          cargo test
          cargo build --release

  # ==========================================================================
  # WebAssembly bindings (wasm32 build)
  # ==========================================================================
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build core for wasm32
        run: cargo build --target wasm32-unknown-unknown --no-default-features
      - name: Build wasm bindings
        working-directory: wasm
        run: cargo build --target wasm32-unknown-unknown --release

  # ==========================================================================
  # Fuzzing (nightly schedule + manual; bounded run on PRs touching parsers)
  # ==========================================================================
  fuzz:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_detect, fuzz_archive, fuzz_entropy, fuzz_binary]
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@cargo-fuzz

      - name: Run fuzz target
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=120 -rss_limit_mb=4096

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/

  # ==========================================================================
  # Release builds
  # ==========================================================================
  release:
    needs: [test-linux, test-macos, test-windows, msrv]
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: batin-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: batin-linux-x86_64-musl
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            name: batin-linux-i686
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: batin-linux-aarch64
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            name: batin-linux-armv7
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            name: batin-linux-riscv64
          
          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            name: batin-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: batin-macos-aarch64
          
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: batin-windows-x86_64.exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            name: batin-windows-i686.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: batin-windows-aarch64.exe

          # FreeBSD (cross-compiled from Linux)
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            name: batin-freebsd-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (Linux ARM/RISC-V/FreeBSD)
        if: contains(matrix.target, 'aarch64-unknown-linux') || contains(matrix.target, 'armv7') || contains(matrix.target, 'riscv64') || contains(matrix.target, 'i686-unknown-linux') || contains(matrix.target, 'freebsd')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary (Native)
        if: "!contains(matrix.target, 'aarch64-unknown-linux') && !contains(matrix.target, 'armv7') && !contains(matrix.target, 'riscv64') && !contains(matrix.target, 'i686-unknown-linux') && !contains(matrix.target, 'freebsd')"
        run: cargo build --release --target ${{ matrix.target }} --features full

      - name: Build release binary (Cross)
        if: contains(matrix.target, 'aarch64-unknown-linux') || contains(matrix.target, 'armv7') || contains(matrix.target, 'riscv64') || contains(matrix.target, 'i686-unknown-linux') || contains(matrix.target, 'freebsd')
        run: cross build --release --target ${{ matrix.target }} --features full

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/batin ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/batin.exe ${{ matrix.name }}

      - name: Generate Checksums
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
          else
            sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Docker build
  # ==========================================================================
  docker:
    needs: [test-linux]
    runs-on: ubuntu-latest
    # Only build/push images for tagged releases, and only when Docker Hub
    # credentials are configured (steps below no-op otherwise).
    if: startsWith(github.ref, 'refs/tags/')
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ahmeddwalid/batin:latest
            ahmeddwalid/batin:${{ github.ref_name }}

