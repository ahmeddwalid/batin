name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # Primary test job on Linux
  # ==========================================================================
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Build
        run: cargo build --all-features --verbose

      - name: Run tests
        run: cargo test --all-features --verbose

      - name: Test no default features
        run: cargo check --no-default-features

      - name: Test individual features
        run: |
          cargo check --features hashing
          cargo check --features binary-parsing
          cargo check --features archive

  # ==========================================================================
  # Cross-platform builds (macOS and Windows)
  # ==========================================================================
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Build
        run: cargo build --all-features

      - name: Run tests
        run: cargo test --all-features

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Build
        run: cargo build --all-features

      - name: Run tests
        run: cargo test --all-features

  # ==========================================================================
  # MSRV Check
  # ==========================================================================
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.75
        uses: dtolnay/rust-action@1.75.0

      - name: Check MSRV
        run: cargo check --all-features --verbose

  # ==========================================================================
  # Security Audit
  # ==========================================================================
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Security audit
        run: cargo audit

  # ==========================================================================
  # Release builds
  # ==========================================================================
  release:
    needs: [test-linux, test-macos, test-windows, msrv]
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: batin-linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: batin-linux-x86_64-musl
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            name: batin-linux-i686
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: batin-linux-aarch64
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            name: batin-linux-armv7
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            name: batin-linux-riscv64
          
          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            name: batin-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: batin-macos-aarch64
          
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: batin-windows-x86_64.exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            name: batin-windows-i686.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: batin-windows-aarch64.exe

          # FreeBSD (cross-compiled from Linux)
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            name: batin-freebsd-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux musl)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (Linux ARM/RISC-V/FreeBSD)
        if: contains(matrix.target, 'aarch64-unknown-linux') || contains(matrix.target, 'armv7') || contains(matrix.target, 'riscv64') || contains(matrix.target, 'i686-unknown-linux') || contains(matrix.target, 'freebsd')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary (Native)
        if: "!contains(matrix.target, 'aarch64-unknown-linux') && !contains(matrix.target, 'armv7') && !contains(matrix.target, 'riscv64') && !contains(matrix.target, 'i686-unknown-linux') && !contains(matrix.target, 'freebsd')"
        run: cargo build --release --target ${{ matrix.target }} --all-features

      - name: Build release binary (Cross)
        if: contains(matrix.target, 'aarch64-unknown-linux') || contains(matrix.target, 'armv7') || contains(matrix.target, 'riscv64') || contains(matrix.target, 'i686-unknown-linux') || contains(matrix.target, 'freebsd')
        run: cross build --release --target ${{ matrix.target }} --all-features

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/batin ${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/batin.exe ${{ matrix.name }}

      - name: Generate Checksums
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
          else
            sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Docker build
  # ==========================================================================
  docker:
    needs: [test-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ahmeddwalid/batin:latest
            ahmeddwalid/batin:${{ github.ref_name }}

