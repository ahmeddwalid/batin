# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
ignore = [
    # rsa Marvin timing side-channel. Pulled only by the optional yara-x
    # dependency (yara feature); not present in the default build, has no
    # upstream fix, and batin never performs RSA operations.
    "RUSTSEC-2023-0071",
    # bincode is flagged unmaintained. Transitive via yara-x only.
    "RUSTSEC-2025-0141",
    # number_prefix is flagged unmaintained. Transitive via indicatif (CLI).
    "RUSTSEC-2025-0119",
]

[licenses]
version = 2
# Batin is GPL-3.0-only; permit common permissive licenses for dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "GPL-3.0-only",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    # Permissive data-license used by some wasm-target build crates (wit-bindgen).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
