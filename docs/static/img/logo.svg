<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25c2a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a8870;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Magnifying glass circle -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="url(#grad)" stroke-width="6"/>
  
  <!-- Magnifying glass handle -->
  <line x1="62" y1="62" x2="88" y2="88" stroke="url(#grad)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Eye in center (representing "inner sight") -->
  <ellipse cx="40" cy="40" rx="12" ry="8" fill="url(#grad)" opacity="0.3"/>
  <circle cx="40" cy="40" r="5" fill="url(#grad)"/>
</svg>